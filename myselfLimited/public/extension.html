<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat Application</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="css/demo.css" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding-top: 60px;
      }

      #username-container {
        margin-bottom: 20px;
      }

      #username-input,
      .message_form__input {
        padding: 10px;
        font-size: 16px;
      }

      button,
      .message_form__button {
        padding: 10px 20px;
        background: hsl(122, 39%, 49%);
        color: white;
        border: none;
        cursor: pointer;
        margin-left: 10px;
      }

      button:hover,
      .message_form__button:hover {
        background: hsl(123, 40%, 45%);
      }

      .messages__history {
        margin-bottom: 20px;
        border: 1px solid hsl(0, 0%, 87%);
        padding: 10px;
        height: 400px;
        overflow-y: auto;
      }

      .message-item {
        padding: 8px 16px;
        border-bottom: 1px solid hsl(0, 0%, 93%);
      }

      .message-item:last-child {
        border-bottom: none;
      }

      .system-message {
        color: hsl(0, 0%, 40%);
        font-style: italic;
        font-size: 0.9em;
      }

      .message_form {
        display: flex;
        margin-top: 10px;
      }

      .message_form__input {
        flex-grow: 1;
      }
    </style>
  </head>

  <body class="container" style="background-color: hsl(198, 78%, 5%)">
    <nav class="navbar">
      <a class="navA" style="padding: 1% 1%" href="index.html"
        >Return to home page</a
      >
    </nav>
    <div
      class="position-relative mb-4"
      style="
        margin-left: calc(-50vw + 50%);
        margin-right: calc(-50vw + 50%);
        border-radius: 0;
        overflow: hidden;
        height: 400px;
        background: linear-gradient(
          to bottom,
          rgba(3, 17, 24, 0.35) 0%,
          rgba(3, 17, 24, 0.65) 100%
        );
      "
    >
      <div
        class="position-absolute top-50 start-50 translate-middle text-center px-3"
      >
        <h2
          style="
            color: hsl(207, 72%, 83%);
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 700;
            line-height: 1.15;
          "
        >
          CHAT APPLICATION
        </h2>
      </div>
    </div>

    <div class="messaging text">
      <div class="inbox__people">
        <h3>Active users</h3>
      </div>

      <div class="messaging__area">
        <div class="messages__history"></div>
        <div id="username-container">
          <input
            type="text"
            id="username-input"
            placeholder="Enter a username..."
          >
          <button id="set-username">Set Username</button>
        </div>
        <div
          id="typing-indicator"
          style="
            color: hsl(0, 0%, 87%);
            font-style: italic;
            min-height: 20px;
            padding: 4px 0;
          "
        ></div>
        <form class="message_form">
          <input
            type="text"
            class="message_form__input"
            placeholder="Type a message..."
            autocomplete="off"
          >
          <button type="submit" class="message_form__button">Send</button>
        </form>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/client.js"></script>
  </body>
</html>
